{% extends 'urunler/base.html' %}

{% block content %}
<h1 class="text-center mb-4">İletişim</h1>
<p class="text-center lead">Bizimle iletişime geçmek için aşağıdaki formu doldurun.</p>

<div class="row justify-content-center">
    <div class="col-md-6">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_ad" class="form-label">Adınız</label>
                {{ form.ad }}
            </div>
            <div class="mb-3">
                <label for="id_email" class="form-label">E-posta Adresiniz</label>
                {{ form.email }}
            </div>
            <div class="mb-3">
                <label for="id_telefon" class="form-label">Telefon Numaranız (İsteğe Bağlı)</label>
                {{ form.telefon }}
            </div>
            <div class="mb-3">
                <label for="id_mesaj" class="form-label">Mesajınız</label>
                {{ form.mesaj }}
            </div>
            <button type="submit" class="btn btn-primary">Gönder</button>
        </form>
    </div>
</div>
{% endblock %}
